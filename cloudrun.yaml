apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: oceanwatch
spec:
  template:
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPO/oceanwatch:latest
          env:
            - name: VERTEX_MODEL
              value: gemini-2.0-flash-lite
            - name: OCEANWATCH_VERTEX_MODEL_CANDIDATES
              value: gemini-2.0-flash,gemini-2.5-flash-lite
            - name: OCEANWATCH_APP_NAME
              value: oceanwatch
            - name: OCEANWATCH_REQUIRE_ADK_SUCCESS
              value: "true"
            - name: OCEANWATCH_ALLOW_TRANSIENT_FALLBACK_WHEN_STRICT
              value: "true"
            - name: OCEANWATCH_DEFAULT_HOURS
              value: "168"
            - name: OCEANWATCH_TIMEOUT_SECONDS
              value: "20"
            - name: OCEANWATCH_RETRY_ATTEMPTS
              value: "3"
            - name: OCEANWATCH_ADK_TIMEOUT_SECONDS
              value: "45"
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
          ports:
            - containerPort: 8080
      timeoutSeconds: 900
